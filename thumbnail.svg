<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans KR, sans-serif">
  <!-- 배경 -->
  <rect width="1280" height="640" fill="#1C1E26"/>

  <!-- 점 격자 배경 -->
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.1" fill="#ffffff" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- 우측 대형 동심원 아크 (페이지 밖으로 확장) -->
  <g transform="translate(1100, 320)">
    <circle cx="0" cy="0" r="380" fill="none" stroke="#1A9E94" stroke-width="95" opacity="0.10"/>
    <circle cx="0" cy="0" r="250" fill="none" stroke="#1A9E94" stroke-width="38" opacity="0.08"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#1A9E94" stroke-width="18" opacity="0.06"/>
  </g>

  <!-- 사선 장식 (우상 → 좌하) -->
  <line x1="1280" y1="180" x2="500"  y2="640" stroke="#1A9E94" stroke-width="2.2" opacity="0.18"/>
  <line x1="1280" y1="280" x2="640"  y2="640" stroke="#1A9E94" stroke-width="1.4" opacity="0.10"/>
  <line x1="1280" y1="380" x2="780"  y2="640" stroke="#1A9E94" stroke-width="0.9" opacity="0.06"/>

  <!-- 우측 수직 데이터 바 -->
  <g transform="translate(1180, 0)">
    <rect x="0"  y="80"  width="11" height="78"  fill="#1A9E94" opacity="0.38"/>
    <rect x="0"  y="172" width="11" height="42"  fill="#1A9E94" opacity="0.22"/>
    <rect x="0"  y="226" width="11" height="58"  fill="#1A9E94" opacity="0.14"/>
    <rect x="0"  y="296" width="11" height="22"  fill="#1A9E94" opacity="0.09"/>
    <rect x="0"  y="332" width="11" height="86"  fill="#1A9E94" opacity="0.20"/>
    <rect x="0"  y="430" width="11" height="32"  fill="#1A9E94" opacity="0.12"/>
    <rect x="0"  y="476" width="11" height="48"  fill="#1A9E94" opacity="0.08"/>
    <rect x="0"  y="538" width="11" height="62"  fill="#1A9E94" opacity="0.06"/>
    <rect x="20" y="120" width="11" height="44"  fill="#1A9E94" opacity="0.16"/>
    <rect x="20" y="178" width="11" height="22"  fill="#1A9E94" opacity="0.10"/>
    <rect x="20" y="216" width="11" height="68"  fill="#1A9E94" opacity="0.07"/>
    <rect x="20" y="300" width="11" height="32"  fill="#1A9E94" opacity="0.05"/>
    <rect x="20" y="350" width="11" height="52"  fill="#1A9E94" opacity="0.09"/>
    <rect x="20" y="418" width="11" height="18"  fill="#1A9E94" opacity="0.05"/>
  </g>

  <!-- 좌측 accent 밴드 -->
  <rect x="0" y="0" width="14" height="640" fill="#1A9E94"/>

  <!-- 시리즈 레이블 (좌상단) -->
  <g transform="translate(64, 64)">
    <rect x="0" y="6" width="32" height="2" fill="#1A9E94"/>
    <text x="44" y="14" font-size="13" font-weight="700" fill="#1A9E94" letter-spacing="2.2">COWORK LECTURE SERIES</text>
  </g>

  <!-- 큰 따옴표 장식 -->
  <text x="64" y="280" font-family="Georgia, serif" font-size="112" fill="#1A9E94" opacity="0.18" font-weight="700">"</text>

  <!-- 메인 타이틀 -->
  <text x="64" y="370" font-size="84" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">Cowork에서</text>
  <text x="64" y="460" font-size="84" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">하네스?</text>

  <!-- 부제 -->
  <g transform="translate(64, 510)">
    <rect x="0" y="8" width="44" height="3" fill="#1A9E94" rx="1.5"/>
    <text x="60" y="18" font-size="22" font-weight="500" fill="#FFFFFF" opacity="0.55">핵심은 CLAUDE.md</text>
  </g>

  <!-- 하단 저자 영역 -->
  <line x1="64" y1="570" x2="600" y2="570" stroke="#FFFFFF" opacity="0.12" stroke-width="1"/>
  <text x="64" y="600" font-size="11" font-weight="700" fill="#FFFFFF" opacity="0.35" letter-spacing="2">AUTHOR</text>
  <text x="160" y="600" font-size="18" font-weight="700" fill="#FFFFFF">조남경</text>

  <!-- 우하단 데이터 바 (저자 옆) -->
  <g transform="translate(540, 588)">
    <rect x="0"  y="6"  width="8" height="8"  fill="#FFFFFF" opacity="0.18"/>
    <rect x="14" y="0"  width="8" height="14" fill="#FFFFFF" opacity="0.32"/>
    <rect x="28" y="-12" width="8" height="26" fill="#1A9E94"/>
  </g>

  <!-- 본편/응용편 구분 표시 (우하단 영역) -->
  <g transform="translate(720, 530)">
    <rect x="0" y="0" width="220" height="80" rx="8" fill="#FFFFFF" opacity="0.04" stroke="#1A9E94" stroke-width="1" stroke-opacity="0.4"/>
    <text x="20" y="26" font-size="11" font-weight="700" fill="#1A9E94" letter-spacing="1.5">CONTENTS</text>
    <text x="20" y="50" font-size="14" font-weight="700" fill="#FFFFFF">본편 1~5장</text>
    <text x="20" y="68" font-size="12" font-weight="500" fill="#FFFFFF" opacity="0.55">+ 응용편 6장 · 멀티 에이전트</text>
  </g>
</svg>
